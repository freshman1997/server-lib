<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Yuan NAS Admin</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #f6f7f9; color: #1f2937; }
    header { background: #0f172a; color: white; padding: 16px 24px; }
    main { max-width: 1080px; margin: 0 auto; padding: 24px; }
    section { background: white; border: 1px solid #d8dee8; border-radius: 8px; margin-bottom: 16px; padding: 16px; }
    h1 { font-size: 22px; margin: 0; }
    h2 { font-size: 16px; margin: 0 0 12px; }
    button { padding: 6px 10px; border: 1px solid #94a3b8; background: #f8fafc; border-radius: 6px; cursor: pointer; }
    input { padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar input[type="text"] { min-width: 280px; flex: 1; }
    .actions { display: flex; gap: 8px; }
    a { color: #0369a1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid #eef1f5; padding: 8px; }
    .muted { color: #64748b; }
    .error { color: #b91c1c; }
  </style>
</head>
<body>
  <header>
    <h1>Yuan NAS Admin</h1>
  </header>
  <main>
    <section>
      <h2>Credentials</h2>
      <div class="toolbar">
        <input id="authUser" type="text" value="admin" aria-label="Username">
        <input id="authPassword" type="password" aria-label="Password">
        <button id="saveAuth" type="button">Save</button>
        <button id="clearAuth" type="button">Clear</button>
        <span id="authStatus" class="muted">Not saved</span>
      </div>
    </section>
    <section>
      <h2>Health</h2>
      <button id="probeHealth" type="button">Probe</button>
      <pre id="health" class="muted">Loading...</pre>
    </section>
    <section>
      <h2>Files</h2>
      <div class="toolbar">
        <input id="filePath" type="text" value="/dav/public/" aria-label="WebDAV path">
        <button id="refreshFiles" type="button">Refresh</button>
        <input id="uploadFile" type="file">
      </div>
      <div id="files" class="muted">Loading...</div>
    </section>
    <section>
      <h2>Create User</h2>
      <form id="userForm">
        <input name="id" placeholder="id">
        <input name="username" placeholder="username" required>
        <input name="password" type="password" placeholder="password">
        <input name="smb_password" type="password" placeholder="SMB password (blank = same)">
        <label><input name="enabled" type="checkbox" checked> enabled</label>
        <label><input name="smb_enabled" type="checkbox"> smb</label>
        <label><input name="admin" type="checkbox"> admin</label>
        <button type="submit">Save User</button>
      </form>
    </section>
    <section>
      <h2>Create Share</h2>
      <form id="shareForm">
        <input name="id" placeholder="id" required>
        <input name="name" placeholder="name" required>
        <input name="root_path" placeholder="root path" required>
        <label><input name="enabled" type="checkbox" checked> enabled</label>
        <label><input name="readonly" type="checkbox"> readonly</label>
        <button type="submit">Save Share</button>
      </form>
    </section>
    <section>
      <h2>Share Permissions</h2>
      <form id="permissionForm">
        <input name="share" placeholder="share id or name" required>
        <input name="username" placeholder="username" required>
        <label><input name="read" type="checkbox" checked> read</label>
        <label><input name="write" type="checkbox"> write</label>
        <label><input name="remove" type="checkbox"> delete</label>
        <label><input name="admin" type="checkbox"> admin</label>
        <label><input name="clear" type="checkbox"> use default</label>
        <button type="submit">Save Permission</button>
      </form>
    </section>
    <section>
      <h2>Users</h2>
      <div id="users" class="muted">Loading...</div>
    </section>
    <section>
      <h2>Shares</h2>
      <div id="shares" class="muted">Loading...</div>
    </section>
    <section>
      <h2>Quota</h2>
      <div id="quota" class="muted">Loading...</div>
    </section>
    <section>
      <h2>Activity</h2>
      <pre id="activity" class="muted">Loading...</pre>
    </section>
    <section>
      <h2>Sessions</h2>
      <div id="sessions" class="muted">Loading...</div>
    </section>
    <section>
      <h2>Audit</h2>
      <div id="audit" class="muted">Loading...</div>
    </section>
  </main>
  <script>
    function authHeaders(extra) {
      const headers = Object.assign({}, extra || {});
      const user = sessionStorage.getItem('nasAdminUser') || document.getElementById('authUser')?.value || '';
      const password = sessionStorage.getItem('nasAdminPassword') || document.getElementById('authPassword')?.value || '';
      if (user && password) {
        headers.Authorization = 'Basic ' + btoa(user + ':' + password);
      }
      return headers;
    }

    function updateAuthStatus() {
      const saved = sessionStorage.getItem('nasAdminUser') && sessionStorage.getItem('nasAdminPassword');
      document.getElementById('authStatus').textContent = saved ? 'Saved for this tab' : 'Not saved';
    }

    async function getJson(url) {
      const response = await fetch(url, {
        credentials: 'same-origin',
        headers: authHeaders()
      });
      if (!response.ok) throw new Error(response.status);
      return response.json();
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        credentials: 'same-origin',
        body: JSON.stringify(body)
      });
      if (!response.ok) throw new Error(response.status);
      return response.json();
    }

    function table(rows, cols) {
      if (!rows.length) return '<p class="muted">Empty</p>';
      return '<table><thead><tr>' + cols.map(c => '<th>' + c + '</th>').join('') +
        '</tr></thead><tbody>' +
        rows.map(r => '<tr>' + cols.map(c => {
          const v = r[c];
          const text = Array.isArray(v) || (v && typeof v === 'object') ? JSON.stringify(v) : String(v === undefined || v === null ? '' : v);
          return '<td>' + text + '</td>';
        }).join('') + '</tr>').join('') +
        '</tbody></table>';
    }

    function ensureDirPath(path) {
      if (!path.startsWith('/')) path = '/' + path;
      return path.endsWith('/') ? path : path + '/';
    }

    function parentPath(path) {
      path = ensureDirPath(path);
      const trimmed = path.slice(0, -1);
      const idx = trimmed.lastIndexOf('/');
      return idx <= 0 ? '/dav/public/' : trimmed.slice(0, idx + 1);
    }

    function mountPrefixFromPath(path) {
      path = ensureDirPath(path || '/dav/public/');
      const parts = path.split('/').filter(Boolean);
      return parts.length ? '/' + parts[0] : '/dav';
    }

    function webdavUrlFromHref(href, currentPath) {
      let out = decodeURIComponent((href || '').split('?')[0]);
      if (!out.startsWith('/')) out = '/' + out;
      const mount = mountPrefixFromPath(currentPath);
      return out === mount || out.startsWith(mount + '/') ? out : mount + out;
    }

    function displayNameFromHref(href) {
      const clean = decodeURIComponent(href.split('?')[0]).replace(/\/$/, '');
      const idx = clean.lastIndexOf('/');
      return idx >= 0 ? clean.slice(idx + 1) : clean;
    }

    async function loadFiles() {
      const pathInput = document.getElementById('filePath');
      const path = ensureDirPath(pathInput.value || '/dav/public/');
      pathInput.value = path;
      const box = document.getElementById('files');
      box.textContent = 'Loading...';
      try {
        const response = await fetch(path, {
          method: 'PROPFIND',
          headers: authHeaders({ Depth: '1' }),
          credentials: 'same-origin'
        });
        if (!response.ok) throw new Error(response.status);
        const text = await response.text();
        const xml = new DOMParser().parseFromString(text, 'application/xml');
        const responses = Array.from(xml.getElementsByTagNameNS('*', 'response'));
        const rows = responses.map(item => {
          const href = item.getElementsByTagNameNS('*', 'href')[0]?.textContent || '';
          const typeNode = item.getElementsByTagNameNS('*', 'resourcetype')[0];
          const isDir = !!typeNode && typeNode.getElementsByTagNameNS('*', 'collection').length > 0;
          const size = item.getElementsByTagNameNS('*', 'getcontentlength')[0]?.textContent || '';
          const modified = item.getElementsByTagNameNS('*', 'getlastmodified')[0]?.textContent || '';
          const url = webdavUrlFromHref(href, path);
          return { href, url, name: displayNameFromHref(href), isDir, size, modified };
        }).filter(row => row.href && row.url.replace(/\/$/, '') !== path.replace(/\/$/, ''));

        let html = '<div class="toolbar"><button type="button" data-open="' + parentPath(path) + '">Up</button></div>';
        if (!rows.length) {
          html += '<p class="muted">Empty</p>';
        } else {
          html += '<table><thead><tr><th>Name</th><th>Type</th><th>Size</th><th>Modified</th><th>Actions</th></tr></thead><tbody>';
          html += rows.map(row => {
            const href = row.url;
            const openTarget = row.isDir ? ensureDirPath(href) : href;
            const name = row.name || openTarget;
            const actions = row.isDir
              ? '<button type="button" data-open="' + openTarget + '">Open</button>'
              : '<span class="actions"><button type="button" data-download="' + href + '">Download</button><button type="button" data-delete="' + href + '">Delete</button></span>';
            return '<tr><td>' + name + '</td><td>' + (row.isDir ? 'folder' : 'file') + '</td><td>' +
              (row.size || '') + '</td><td>' + (row.modified || '') + '</td><td>' + actions + '</td></tr>';
          }).join('');
          html += '</tbody></table>';
        }
        box.innerHTML = html;
      } catch (e) {
        box.innerHTML = '<p class="error">File API error: ' + e.message + '</p>';
      }
    }

    async function load() {
      try {
        const health = await getJson('/nas/health');
        document.getElementById('health').textContent = JSON.stringify(health, null, 2);

        const users = await getJson('/nas/admin/users');
        document.getElementById('users').innerHTML = table(users.users || [], ['id', 'username', 'enabled', 'admin', 'smb_enabled']);

        const shares = await getJson('/nas/admin/shares');
        document.getElementById('shares').innerHTML = table(shares.shares || [], ['id', 'name', 'root_path', 'enabled', 'readonly', 'default_permissions', 'subject_permissions']);

        const quota = await getJson('/nas/admin/quota');
        document.getElementById('quota').innerHTML = table(quota.shares || [], ['id', 'name', 'exists', 'used_bytes', 'available_bytes']);

        const activity = await getJson('/nas/admin/activity');
        document.getElementById('activity').textContent = JSON.stringify(activity, null, 2);

        const sessions = await getJson('/nas/admin/sessions');
        document.getElementById('sessions').innerHTML = table(sessions.sessions || [], ['username', 'remote_addr', 'last_path', 'request_count', 'last_seen_unix_ms']);

        const audit = await getJson('/nas/admin/audit');
        document.getElementById('audit').innerHTML = table(audit.events || [], ['timestamp_unix_ms', 'actor', 'action', 'target', 'detail']);
      } catch (e) {
        document.querySelector('main').insertAdjacentHTML('afterbegin', '<section class="error">Admin API error: ' + e.message + '</section>');
      }
      loadFiles();
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      await postJson('/nas/admin/users', {
        id: form.elements.id.value,
        username: form.elements.username.value,
        password: form.elements.password.value,
        smb_password: form.elements.smb_password.value || undefined,
        smb_enabled: form.elements.smb_enabled.checked,
        enabled: form.elements.enabled.checked,
        admin: form.elements.admin.checked
      });
      form.reset();
      form.elements.enabled.checked = true;
      load();
    });

    document.getElementById('shareForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      await postJson('/nas/admin/shares', {
        id: form.elements.id.value,
        name: form.elements.name.value,
        root_path: form.elements.root_path.value,
        readonly: form.elements.readonly.checked,
        enabled: form.elements.enabled.checked,
        default_permissions: ['read', 'write', 'remove']
      });
      form.reset();
      form.elements.enabled.checked = true;
      load();
    });

    document.getElementById('permissionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const permissions = [];
      if (form.elements.read.checked) permissions.push('read');
      if (form.elements.write.checked) permissions.push('write');
      if (form.elements.remove.checked) permissions.push('remove');
      if (form.elements.admin.checked) permissions.push('admin');
      await postJson('/nas/admin/permissions', {
        share: form.elements.share.value,
        username: form.elements.username.value,
        permissions,
        clear: form.elements.clear.checked
      });
      form.reset();
      form.elements.read.checked = true;
      load();
    });

    document.getElementById('probeHealth').addEventListener('click', async () => {
      const result = await postJson('/nas/admin/health/actions', { action: 'probe' });
      document.getElementById('health').textContent = JSON.stringify(result.health, null, 2);
      load();
    });

    document.getElementById('refreshFiles').addEventListener('click', loadFiles);
    document.getElementById('saveAuth').addEventListener('click', () => {
      sessionStorage.setItem('nasAdminUser', document.getElementById('authUser').value);
      sessionStorage.setItem('nasAdminPassword', document.getElementById('authPassword').value);
      updateAuthStatus();
      load();
    });
    document.getElementById('clearAuth').addEventListener('click', () => {
      sessionStorage.removeItem('nasAdminUser');
      sessionStorage.removeItem('nasAdminPassword');
      document.getElementById('authPassword').value = '';
      updateAuthStatus();
    });
    document.getElementById('files').addEventListener('click', async (e) => {
      const open = e.target.getAttribute('data-open');
      const del = e.target.getAttribute('data-delete');
      const download = e.target.getAttribute('data-download');
      if (open) {
        document.getElementById('filePath').value = open;
        loadFiles();
      }
      if (download) {
        const response = await fetch(download, { credentials: 'same-origin', headers: authHeaders() });
        if (!response.ok) {
          alert('Download failed: ' + response.status);
          return;
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = displayNameFromHref(download);
        a.click();
        URL.revokeObjectURL(url);
      }
      if (del && confirm('Delete ' + del + '?')) {
        const response = await fetch(del, { method: 'DELETE', credentials: 'same-origin', headers: authHeaders() });
        if (!response.ok) alert('Delete failed: ' + response.status);
        loadFiles();
      }
    });
    document.getElementById('uploadFile').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const base = ensureDirPath(document.getElementById('filePath').value || '/dav/public/');
      const response = await fetch(base + encodeURIComponent(file.name), {
        method: 'PUT',
        headers: authHeaders(),
        credentials: 'same-origin',
        body: file
      });
      if (!response.ok) alert('Upload failed: ' + response.status);
      e.target.value = '';
      loadFiles();
    });

    const savedUser = sessionStorage.getItem('nasAdminUser');
    const savedPassword = sessionStorage.getItem('nasAdminPassword');
    if (savedUser) document.getElementById('authUser').value = savedUser;
    if (savedPassword) document.getElementById('authPassword').value = savedPassword;
    updateAuthStatus();
    load();
  </script>
</body>
</html>
