<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>bt_downloader Admin</title>
  <link rel="stylesheet" href="/admin/assets/dashboard.css">
</head>
<body>
  <header>
    <div>
      <h1>bt_downloader</h1>
      <p>Service status, BitTorrent downloads, peers, trackers, and controls</p>
    </div>
    <div id="syncState" class="sync-state sync-pending">Connecting...</div>
  </header>

  <main>
    <div id="errorBanner" class="error-banner" style="display:none"></div>

    <section class="card">
      <h2>System</h2>
      <div id="overview"></div>
    </section>

    <section class="card">
      <h2>BitTorrent</h2>
      <div id="bt"></div>
    </section>

    <section class="card">
      <h2>Controls</h2>
      <div class="row">
        <button id="btStart" type="button">Start Next</button>
        <button id="btStop" class="warn" type="button">Stop All</button>
      </div>

      <div class="input-group">
        <label>Save path</label>
        <div class="row">
          <input id="savePath" type="text" placeholder="Optional download directory. Empty uses the default path." style="flex:1">
        </div>
      </div>

      <div class="input-group">
        <label>Upload .torrent</label>
        <div class="row">
          <label class="inline-file" for="torrentFile">Choose File</label>
          <input id="torrentFile" type="file" accept=".torrent">
          <span id="torrentFileName" class="file-name"></span>
          <button id="btUpload" type="button">Upload and Start</button>
        </div>
        <div id="dropZone" class="drop-zone">Drop a .torrent file here</div>
      </div>

      <div class="input-group">
        <label>Server-side .torrent path</label>
        <div class="row">
          <input id="torrentPath" type="text" placeholder="/path/to/file.torrent">
          <button id="btLoad" type="button">Load and Start</button>
        </div>
      </div>

      <div class="input-group">
        <label>Magnet URI</label>
        <div class="row">
          <input id="magnetUri" type="text" placeholder="magnet:?xt=urn:btih:..." style="flex:1">
          <button id="btMagnet" type="button">Add Magnet</button>
        </div>
      </div>

      <div class="input-group">
        <label>Connection settings</label>
        <div class="row">
          <input id="maxPeers" type="number" min="1" placeholder="Max peers">
          <input id="listenPort" type="number" min="1" max="65535" placeholder="Listen port start">
          <input id="listenPortEnd" type="number" min="1" max="65535" placeholder="Listen port end">
          <input id="downloadLimit" type="number" min="0" placeholder="Download KB/s">
          <input id="uploadLimit" type="number" min="0" placeholder="Upload KB/s">
          <input id="maxConcurrent" type="number" min="1" max="100" placeholder="Concurrent downloads">
        </div>
        <div class="row">
          <label class="toggle-label"><input id="enableDht" type="checkbox" checked> DHT</label>
          <label class="toggle-label"><input id="enablePex" type="checkbox" checked> PEX</label>
          <label class="toggle-label"><input id="enableUpnp" type="checkbox" checked> UPnP/NAT-PMP</label>
          <button id="btApplySettings" type="button">Apply Settings</button>
          <label class="inline-file" for="btImportConfigFile">Choose Config</label>
          <input id="btImportConfigFile" type="file" accept="application/json,.json">
          <button id="btImportConfigApply" type="button">Import Config</button>
          <button id="btExportConfig" type="button">Export Config</button>
        </div>
      </div>

      <div id="controlMsg" class="k"></div>
    </section>

    <section class="card" style="grid-column:1/-1">
      <h2>Tasks</h2>
      <div class="row">
        <input id="taskStartId" type="number" min="1" placeholder="Task ID">
        <button id="taskStartBtn" type="button">Start ID</button>
        <input id="taskStopId" type="number" min="1" placeholder="Task ID">
        <button id="taskStopBtn" class="warn" type="button">Stop ID</button>
        <input id="taskRemoveId" type="number" min="1" placeholder="Task ID">
        <button id="taskRemoveBtn" class="warn" type="button">Remove ID</button>
        <button id="taskRefreshBtn" type="button">Refresh Tasks</button>
      </div>
      <div id="taskSummary" class="task-summary"></div>
      <div id="taskList" class="task-table-wrap">loading...</div>
    </section>

    <section class="card" style="grid-column:1/-1">
      <h2>Events and Service State</h2>
      <pre id="raw">loading...</pre>
    </section>

    <section class="card" style="grid-column:1/-1">
      <h2>Task History</h2>
      <div class="row">
        <input id="historyPage" type="number" min="1" value="1" placeholder="Page">
        <input id="historyPageSize" type="number" min="1" max="100" value="20" placeholder="Page size">
        <button id="historyLoad" type="button">Load History</button>
      </div>
      <pre id="taskHistory">loading...</pre>
    </section>
  </main>

  <div id="detailModal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="detailTitle">Task Detail</h3>
        <div class="modal-actions">
          <span id="detailSync" class="detail-sync">Auto refresh</span>
          <button id="detailClose" type="button">&times;</button>
        </div>
      </div>
      <div id="detailBody" class="modal-body"></div>
    </div>
  </div>

  <script src="/admin/assets/dashboard.js"></script>
</body>
</html>
