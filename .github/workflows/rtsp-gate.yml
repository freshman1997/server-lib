name: rtsp-gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        shell: pwsh
        run: cmake -S . -B build-mingw
      - name: Build RTSP/RTCP targets
        shell: pwsh
        run: cmake --build build-mingw --target release_rtsp_server test_rtsp_server test_rtsp_interop test_rtcp test_rtcp_session test_rtcp_loopback
      - name: Run gate
        shell: pwsh
        run: ./release/rtsp/scripts/run_rtsp_gate.ps1 -BuildDir build-mingw -Regex "rtsp|rtcp"
